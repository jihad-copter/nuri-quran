<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🌙 نووری قورئان</title>

<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&family=Amiri+Quran&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --green:#119775;
  --green2:#1DBF96;
  --dark:#0A1628;
  --gold:#F5C518;
  --white:#fff;
  --bg:#FFF9F0;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Tajawal',sans-serif;
  background:var(--bg);
  direction:rtl;
  overflow-x:hidden;
}

/* TOPBAR */

#topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:linear-gradient(135deg,var(--dark),#142038);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  z-index:1000;
  color:white;
}

.logo{
  font-family:'Reem Kufi',sans-serif;
  font-size:1.2rem;
  color:var(--gold);
}

#stars{
  background:rgba(255,255,255,.1);
  padding:6px 12px;
  border-radius:50px;
}

/* PAGE */

.page{
  display:none;
  padding:80px 14px 90px;
  min-height:100vh;
}

.page.active{
  display:block;
}

/* HOME */

#page-home{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0A1628,#0C3954);
  color:white;
}

.home-title{
  font-size:2.5rem;
  color:var(--gold);
  font-family:'Reem Kufi',sans-serif;
  margin-bottom:20px;
}

.home-grid{
  width:100%;
  max-width:400px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card{
  background:rgba(255,255,255,.1);
  border-radius:18px;
  padding:20px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:scale(1.04);
}

.card-icon{
  font-size:2rem;
  margin-bottom:10px;
}

.card-title{
  font-family:'Reem Kufi',sans-serif;
}

/* LETTERS */

.letters-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.letter-card{
  background:linear-gradient(135deg,var(--green),var(--green2));
  border-radius:18px;
  aspect-ratio:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

.letter-ar{
  font-size:2rem;
  font-family:'Amiri Quran',serif;
}

.letter-name{
  font-size:.8rem;
}

/* GAME */

.game-container{
  position:relative;
  max-width:500px;
  margin:auto;
}

.game-close-btn{
  position:absolute;
  top:-10px;
  left:0;
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
  background:#ff4d4d;
  color:white;
  font-size:1.2rem;
  cursor:pointer;
}

.game-close-btn:active{
  transform:scale(.9);
}

.game-modes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.mode{
  background:white;
  border-radius:18px;
  padding:18px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}

.mode-icon{
  font-size:2rem;
  margin-bottom:10px;
}

.mode-title{
  font-family:'Reem Kufi',sans-serif;
}

#gamePlay{
  display:none;
}

.question-box{
  background:linear-gradient(135deg,#0A1628,#142038);
  color:white;
  border-radius:20px;
  padding:30px;
  text-align:center;
  margin-bottom:20px;
}

.question{
  font-size:4rem;
  font-family:'Amiri Quran',serif;
}

.options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.option{
  padding:14px;
  border:none;
  border-radius:14px;
  background:white;
  cursor:pointer;
  font-size:1.1rem;
  font-family:'Reem Kufi',sans-serif;
}

.option.correct{
  background:#30D158;
  color:white;
}

.option.wrong{
  background:#FF6B6B;
  color:white;
}

/* NAV */

#bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-top:1px solid #ddd;
}

.nav-btn{
  border:none;
  background:none;
  padding:10px;
  cursor:pointer;
}

.nav-icon{
  font-size:1.4rem;
}

.nav-text{
  font-size:.7rem;
}
</style>
</head>

<body>

<div id="topbar">
  <div class="logo">🌙 نووری قورئان</div>
  <div id="stars">⭐ <span id="starsCount">0</span></div>
</div>

<!-- HOME -->

<div id="page-home" class="page active">
  <div class="home-title">نووری قورئان</div>

  <div class="home-grid">
    <div class="card" onclick="goPage('learn')">
      <div class="card-icon">📚</div>
      <div class="card-title">فێربوون</div>
    </div>

    <div class="card" onclick="goPage('game')">
      <div class="card-icon">🎮</div>
      <div class="card-title">یاری</div>
    </div>
  </div>
</div>

<!-- LEARN -->

<div id="page-learn" class="page">

  <h2 style="margin-bottom:20px">📚 پیتەکان</h2>

  <div class="letters-grid" id="lettersGrid"></div>

</div>

<!-- GAME -->

<div id="page-game" class="page">

  <div class="game-container">

    <button class="game-close-btn" onclick="closeGame()">✕</button>

    <div id="gameModes" class="game-modes"></div>

    <div id="gamePlay">

      <div class="question-box">
        <div style="margin-bottom:10px">ناوی ئەم پیتە چییە؟</div>
        <div class="question" id="questionLetter">ب</div>
      </div>

      <div class="options" id="options"></div>

    </div>

  </div>

</div>

<!-- NAV -->

<div id="bottom-nav">

  <button class="nav-btn" onclick="goPage('home')">
    <div class="nav-icon">🏠</div>
    <div class="nav-text">سەرەتا</div>
  </button>

  <button class="nav-btn" onclick="goPage('learn')">
    <div class="nav-icon">📚</div>
    <div class="nav-text">فێربوون</div>
  </button>

  <button class="nav-btn" onclick="goPage('game')">
    <div class="nav-icon">🎮</div>
    <div class="nav-text">یاری</div>
  </button>

</div>

<script>

/* DATA */

const LETTERS = [
  {ar:'ا',name:'ألف',sound:'ألف'},
  {ar:'ب',name:'باء',sound:'باء'},
  {ar:'ت',name:'تاء',sound:'تاء'},
  {ar:'ث',name:'ثاء',sound:'ثاء'},
  {ar:'ج',name:'جيم',sound:'جيم'},
  {ar:'ح',name:'حاء',sound:'حاء'},
  {ar:'خ',name:'خاء',sound:'خاء'},
  {ar:'د',name:'دال',sound:'دال'}
];

let stars = 0;

/* SPEECH FIX */

let arabicVoice = null;

function loadArabicVoice() {

  const voices = speechSynthesis.getVoices();

  arabicVoice =
    voices.find(v => v.lang.includes('ar-SA')) ||
    voices.find(v => v.lang.includes('ar')) ||
    voices[0];
}

loadArabicVoice();

if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadArabicVoice;
}

function speak(text, rate = 0.8){

  if(!window.speechSynthesis){
    alert('المتصفح لا يدعم الصوت');
    return;
  }

  speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);

  utterance.lang = 'ar-SA';
  utterance.rate = rate;
  utterance.pitch = 1;

  if(arabicVoice){
    utterance.voice = arabicVoice;
  }

  speechSynthesis.speak(utterance);
}

/* MOBILE AUDIO FIX */

document.body.addEventListener('click', () => {
  speechSynthesis.resume();
}, { once:true });

/* NAVIGATION */

function goPage(name){

  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active');
  });

  document.getElementById('page-'+name).classList.add('active');
}

/* RENDER LETTERS */

function renderLetters(){

  const grid = document.getElementById('lettersGrid');

  grid.innerHTML = LETTERS.map((l,i)=>`
  
    <div class="letter-card" onclick="openLetter(${i})">
      <div class="letter-ar">${l.ar}</div>
      <div class="letter-name">${l.name}</div>
    </div>
  
  `).join('');
}

function openLetter(i){

  speak(LETTERS[i].sound);
}

/* GAME */

function renderGameModes(){

  document.getElementById('gameModes').innerHTML = `
  
    <div class="mode" onclick="startGame()">
      <div class="mode-icon">🎮</div>
      <div class="mode-title">دەستپێکردن</div>
    </div>
  
  `;
}

let currentQuestion = null;

function startGame(){

  document.getElementById('gameModes').style.display='none';
  document.getElementById('gamePlay').style.display='block';

  nextQuestion();
}

function nextQuestion(){

  const letter = LETTERS[Math.floor(Math.random()*LETTERS.length)];

  currentQuestion = letter;

  document.getElementById('questionLetter').textContent = letter.ar;

  speak(letter.sound);

  let options = [letter.name];

  while(options.length < 4){

    const rand = LETTERS[Math.floor(Math.random()*LETTERS.length)].name;

    if(!options.includes(rand)){
      options.push(rand);
    }
  }

  options = options.sort(()=>Math.random()-0.5);

  document.getElementById('options').innerHTML = options.map(opt=>`
  
    <button class="option" onclick="checkAnswer(this,'${opt}')">
      ${opt}
    </button>
  
  `).join('');
}

function checkAnswer(btn, answer){

  const correct = answer === currentQuestion.name;

  document.querySelectorAll('.option').forEach(b=>{

    if(b.textContent.trim() === currentQuestion.name){
      b.classList.add('correct');
    }
  });

  if(correct){

    btn.classList.add('correct');

    stars += 2;

    updateStars();

    speak('أحسنت');

  }else{

    btn.classList.add('wrong');

    speak(currentQuestion.name);
  }

  setTimeout(()=>{
    nextQuestion();
  },1500);
}

/* CLOSE GAME */

function closeGame(){

  speechSynthesis.cancel();

  document.getElementById('gamePlay').style.display='none';

  document.getElementById('gameModes').style.display='grid';
}

/* STARS */

function updateStars(){

  document.getElementById('starsCount').textContent = stars;
}

/* INIT */

renderLetters();

renderGameModes();

</script>

</body>
</html>
